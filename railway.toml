[build]
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @workspace/wearurway run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "NODE_ENV=production pnpm --filter @workspace/api-server run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
