openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: wearurway API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: products
  - name: fits
  - name: colors
  - name: sizes
  - name: mockups
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products, admin]
      summary: Create a new product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    patch:
      operationId: updateProduct
      tags: [products, admin]
      summary: Update a product (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products, admin]
      summary: Delete a product (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /fits:
    get:
      operationId: getFits
      tags: [fits]
      summary: Get all fits
      responses:
        "200":
          description: List of fits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fit"
    post:
      operationId: createFit
      tags: [fits, admin]
      summary: Create a new fit (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFitBody"
      responses:
        "201":
          description: Created fit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fit"

  /fits/{id}:
    patch:
      operationId: updateFit
      tags: [fits, admin]
      summary: Update a fit (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFitBody"
      responses:
        "200":
          description: Updated fit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fit"
    delete:
      operationId: deleteFit
      tags: [fits, admin]
      summary: Delete a fit (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /fits/{fitId}/colors:
    get:
      operationId: getColors
      tags: [colors]
      parameters:
        - in: path
          name: fitId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of colors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Color"
    post:
      operationId: addColor
      tags: [colors, admin]
      parameters:
        - in: path
          name: fitId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddColorBody"
      responses:
        "201":
          description: Created color
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Color"

  /fits/{fitId}/colors/{colorId}:
    delete:
      operationId: deleteColor
      tags: [colors, admin]
      parameters:
        - in: path
          name: fitId
          required: true
          schema:
            type: string
        - in: path
          name: colorId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /fits/{fitId}/sizes:
    get:
      operationId: getSizes
      tags: [sizes]
      parameters:
        - in: path
          name: fitId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of sizes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Size"
    post:
      operationId: addSize
      tags: [sizes, admin]
      parameters:
        - in: path
          name: fitId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSizeBody"
      responses:
        "201":
          description: Created size
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Size"

  /fits/{fitId}/sizes/{sizeId}:
    patch:
      operationId: updateSize
      tags: [sizes, admin]
      parameters:
        - in: path
          name: fitId
          required: true
          schema:
            type: string
        - in: path
          name: sizeId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSizeBody"
      responses:
        "200":
          description: Updated size
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Size"
    delete:
      operationId: deleteSize
      tags: [sizes, admin]
      parameters:
        - in: path
          name: fitId
          required: true
          schema:
            type: string
        - in: path
          name: sizeId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /mockups:
    get:
      operationId: getMockup
      tags: [mockups]
      summary: Get mockup config for a product+fit+color combo
      parameters:
        - name: productId
          in: query
          required: true
          schema:
            type: string
        - name: fitId
          in: query
          required: true
          schema:
            type: string
        - name: colorId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mockup config (may have empty front/back)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mockup"
    put:
      operationId: saveMockup
      tags: [mockups, admin]
      summary: Create or update mockup for a combo (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveMockupBody"
      responses:
        "200":
          description: Saved mockup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mockup"

  /uploads:
    post:
      operationId: uploadImage
      tags: [admin]
      summary: Upload an image file (admin)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      responses:
        "200":
          description: Logged out

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      responses:
        "200":
          description: Admin session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResponse"
        "401":
          description: Not authenticated

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        available:
          type: boolean
        comingSoon:
          type: boolean
        image:
          type: string
      required: [id, name, available, comingSoon]

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        available:
          type: boolean
        comingSoon:
          type: boolean
        image:
          type: string
      required: [name]

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        available:
          type: boolean
        comingSoon:
          type: boolean
        image:
          type: string

    DeleteProductParams:
      type: object
      properties:
        id:
          type: string
      required: [id]

    Fit:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        available:
          type: boolean
        comingSoon:
          type: boolean
        productId:
          type: string
      required: [id, name, available, comingSoon, productId]

    CreateFitBody:
      type: object
      properties:
        name:
          type: string
        productId:
          type: string
        available:
          type: boolean
        comingSoon:
          type: boolean
      required: [name, productId]

    UpdateFitBody:
      type: object
      properties:
        name:
          type: string
        available:
          type: boolean
        comingSoon:
          type: boolean

    Color:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        hex:
          type: string
        fitId:
          type: string
      required: [id, name, hex, fitId]

    AddColorBody:
      type: object
      properties:
        name:
          type: string
        hex:
          type: string
      required: [name, hex]

    Size:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        realWidth:
          type: number
        realHeight:
          type: number
        image:
          type: string
        fitId:
          type: string
      required: [id, name, realWidth, realHeight, fitId]

    AddSizeBody:
      type: object
      properties:
        name:
          type: string
        realWidth:
          type: number
        realHeight:
          type: number
        image:
          type: string
      required: [name, realWidth, realHeight]

    UpdateSizeBody:
      type: object
      properties:
        name:
          type: string
        realWidth:
          type: number
        realHeight:
          type: number
        image:
          type: string

    UploadResponse:
      type: object
      properties:
        url:
          type: string
        filename:
          type: string
      required: [url, filename]

    AdminLoginBody:
      type: object
      properties:
        password:
          type: string
      required: [password]

    AdminLoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        token:
          type: string
      required: [success, message]

    AdminMeResponse:
      type: object
      properties:
        authenticated:
          type: boolean
      required: [authenticated]

    BoundingBox:
      type: object
      properties:
        x:
          type: number
          description: Left position as percentage (0-100) of image width
        y:
          type: number
          description: Top position as percentage (0-100) of image height
        width:
          type: number
          description: Width as percentage (0-100) of image width
        height:
          type: number
          description: Height as percentage (0-100) of image height
      required: [x, y, width, height]

    MockupSide:
      type: object
      properties:
        image:
          type: string
        boundingBox:
          $ref: "#/components/schemas/BoundingBox"

    Mockup:
      type: object
      properties:
        productId:
          type: string
        fitId:
          type: string
        colorId:
          type: string
        front:
          $ref: "#/components/schemas/MockupSide"
        back:
          $ref: "#/components/schemas/MockupSide"
        viewerWidthPct:
          type: number
          description: Max width of the mockup viewer in the designer as a percentage (10-100)
        viewerAspectW:
          type: number
          description: Aspect ratio width component (e.g. 3 for 3:4)
        viewerAspectH:
          type: number
          description: Aspect ratio height component (e.g. 4 for 3:4)
      required: [productId, fitId, colorId]

    SaveMockupBody:
      type: object
      properties:
        productId:
          type: string
        fitId:
          type: string
        colorId:
          type: string
        front:
          $ref: "#/components/schemas/MockupSide"
        back:
          $ref: "#/components/schemas/MockupSide"
        viewerWidthPct:
          type: number
        viewerAspectW:
          type: number
        viewerAspectH:
          type: number
      required: [productId, fitId, colorId]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
