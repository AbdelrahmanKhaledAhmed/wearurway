kind = "web"
previewPath = "/"
title = "wearurway"
version = "1.0.0"
id = "artifacts/wearurway"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20592

[services.development]
run = "pnpm --filter @workspace/wearurway run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wearurway", "run", "build" ]
publicDir = "artifacts/wearurway/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20592"
BASE_PATH = "/"
